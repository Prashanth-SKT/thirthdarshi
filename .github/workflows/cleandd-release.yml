# Build signed release .aab using secrets stored in GitHub (Settings → Secrets).
# Trigger manually: Actions → CleanDD Release → Run workflow
name: CleanDD Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/CleanDD
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/CleanDD/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/thirtdarshi-new.keystore

      - name: Write signing config
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=app/thirtdarshi-new.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Write Maps API key for build
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          cat > android/gradle.properties <<EOF
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          org.gradle.workers.max=2
          MAPS_API_KEY=${MAPS_API_KEY}
          EOF

      - name: Build release AAB
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease --no-daemon

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: apps/CleanDD/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
