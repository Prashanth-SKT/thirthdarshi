name: TirthDarshi CI

on:
  push:
    paths:
      - 'apps/CleanDD/**'
      - '.github/workflows/tirthdarshi-ci.yml'
  pull_request:
    paths:
      - 'apps/CleanDD/**'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/CleanDD
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/CleanDD/package-lock.json
      - run: npm ci
      - run: npm test -- --passWithNoTests
      - run: npx eslint App.js config/ utils/ __tests__/ --max-warnings 0
