# Build signed release .aab + .apk using GitHub Actions secrets.
# Run manually: Actions → TirthDarshi Release → Run workflow
name: TirthDarshi Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/CleanDD
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD MAPS_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets under GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/CleanDD/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/thirtdarshi-new.keystore

      - name: Write signing config
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          printf '%s\n' \
            'storeFile=app/thirtdarshi-new.keystore' \
            "storePassword=${ANDROID_KEYSTORE_PASSWORD}" \
            "keyAlias=${ANDROID_KEY_ALIAS}" \
            "keyPassword=${ANDROID_KEY_PASSWORD}" \
            > android/keystore.properties

      - name: Write Maps API key for build
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          printf '%s\n' \
            'android.useAndroidX=true' \
            'android.enableJetifier=true' \
            'org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m' \
            'org.gradle.workers.max=2' \
            "MAPS_API_KEY=${MAPS_API_KEY}" \
            > android/gradle.properties

      - name: Build release AAB and APK
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Upload release AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: apps/CleanDD/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload release APK (team testing)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: apps/CleanDD/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
