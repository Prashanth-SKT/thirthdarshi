apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

project.ext.vectoricons = [
    iconFontNames: [ 'FontAwesome.ttf' ]
]
project.ext.react = [
    enableHermes: true  
]
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    namespace "com.cleandd"
    defaultConfig {
        applicationId "com.x0xfair.x108DD"

        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 4
        multiDexEnabled true
        versionName "1.0.3"
        
        // ✅ Read Maps API Key from gradle.properties
        def mapsApiKey = project.hasProperty("MAPS_API_KEY") ? project.property("MAPS_API_KEY") : ""
        manifestPlaceholders = [
            MAPS_API_KEY: mapsApiKey
        ]
    }
    
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        
        release {
            // ✅ Check if keystore file exists
            if (project.hasProperty('KEYSTORE_PASSWORD') && 
                project.hasProperty('KEY_PASSWORD') && 
                project.hasProperty('KEY_ALIAS')) {
                
                def keystoreFile = file('./my-upload-key.keystore')
                if (keystoreFile.exists()) {
                    storeFile keystoreFile
                    storePassword project.property('KEYSTORE_PASSWORD')
                    keyPassword project.property('KEY_PASSWORD')
                    keyAlias project.property('KEY_ALIAS')
                } else {
                    throw new GradleException("❌ Keystore file not found at: ${keystoreFile.absolutePath}")
                }
            } else {
                throw new GradleException("❌ Missing signing config properties. Please check gradle.properties has: KEYSTORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS")
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            shrinkResources true
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
    
    packagingOptions {
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
    }
}

// ✅ Exclude play-services-maps from Navigation SDK module
configurations.all {
    exclude group: 'com.google.android.gms', module: 'play-services-maps'
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation 'androidx.multidex:multidex:2.0.1'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs_nio:2.0.4'
    
    // ✅ Google Maps dependencies
    implementation "com.google.android.gms:play-services-location:21.0.1"
    implementation "com.google.android.gms:play-services-maps:18.2.0"
    
    implementation project(':react-native-maps')

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply plugin: 'com.google.gms.google-services'